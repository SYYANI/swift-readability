    <h1>Interview: John Calhoun on the Origins of Glider (Part 1)</h1>

    <div>
                    <article>
                                <div class="PostUser"><h3 class="PostUser-name">mossy_11</h3></div>
                <div class="Post-body">
                    <p style="text-align: center;">
	<img alt="glider3-helicopter-small" height="242" src="https://macscene.s3.amazonaws.com/legacy-images/stories/glider_story/glider3-helicopter-small.jpg" width="385" /></p>
<p>
	John Calhoun's <strong>Glider</strong> games hold a special place in the history of Mac gaming, acting almost as an icon of the platform through much of the 1990s. They spawned a hugely dedicated fan base, which produced a ridiculous amount of original content both for and about Glider -- especially Glider 4 and Glider PRO, the later versions.</p>
<p>
	I caught up with Calhoun over email recently, and quizzed him on the origins and development of the series. This is the first part of that interview. Read on to discover where the idea for Glider originated, how the game came to exist, and how it dramatically altered Calhoun's future.</p>
<p>
	And also be sure to check out <a href="component/content/article/459.html">Dreaming of a Thousand-Room House: The History and Making of Glider</a>, which provides context and a narrative for this interview.</p>
<p>
	<strong>Richard Moss: What inspired you to start programming?</strong></p>
<p>
	&nbsp;</p>
<p>
	<strong><img alt="2001-a_space_odyssey" height="250" src="https://macscene.s3.amazonaws.com/legacy-images/stories/glider_story/2001-a_space_odyssey.jpg" style="margin-top: 5px; margin-right: 5px; margin-bottom: 5px; margin-left: 5px; float: right; " width="171" />John Calhoun:</strong>&nbsp;I can't say for sure. Growing up, computers were a part of science fiction culture. I associated computers with things futuristic, technical &mdash; and these things interested me when I was young. Movies I enjoyed, like&nbsp;<a href="http://www.imdb.com/title/tt0062622/">2001: A Space Odyssey</a>, and T.V. shows I was drawn to, like the original&nbsp;<a href="http://www.imdb.com/title/tt0060028/">Star Trek</a>, portrayed computers in this way.</p>
<p>
	Programming was interesting for a number of reasons, though. There was a certain exploration aspect to it. You knew that there was a lot of potential locked up in the hardware (the computer), and this often helped to draw me further into learning new tricks in software in order to better exploit the machine. Games for the devices showed you that the machine could produce sound, display animated graphics, etc. So when I was just starting to learn to program it was perhaps the technology demonstrated by the computer games that seemed so elusive and out of reach.</p>
<p>
	Back then, though, I was learning to program in BASIC, so there was no way I was going to be able to write a game that could blit as fast as the commercial hand-coded-assembly games. Still, simple BASIC programs that would render geometric shapes using move-to and line-to calls were in subtle ways teaching me about how a computer displays graphics and such.</p>
<p>
	I did very quickly come to want to write computer games, though. Since I enjoyed drawing and other art-related things at that time, it may be that I saw games as bridging the artistic and creative pursuits with those more technical. I also felt like I had some ideas for games that I would like to see written.</p>
<p>
	And finally, I enjoyed playing games in the arcades at the time (games like&nbsp;<a href="http://en.wikipedia.org/wiki/Defender_%28video_game%29">Defender</a>,&nbsp;<a href="http://en.wikipedia.org/wiki/Joust_%28video_game%29">Joust</a>, etc.), but I didn't have enough spare change to play them nearly as much as I would have liked. A computer game that you write is ostensibly free.<br />
	<strong>&nbsp;</strong></p>
<p>
	<strong>RM:</strong><em>&nbsp;</em><strong>I&rsquo;ve read that a very early version of Glider was made on a Commodore VIC-20, but you tried making games before that, and there was a sizable period of time wherein you explored other ideas before you returned to Glider. Could you tell me a little about this time? What came out of these early computing and programming experiences, and how did they impact on your interest in games and digital graphics?</strong></p>
<p>
	<strong>JC:</strong>&nbsp;A friend had a Commodore PET, and it had come with an interesting little game -- written in BASIC -- that vaguely looked like the arcade game&nbsp;<a href="http://en.wikipedia.org/wiki/Asteroids_%28video_game%29">Asteroids</a>&nbsp;(or perhaps&nbsp;<a href="http://en.wikipedia.org/wiki/Frogger">Frogger</a>&nbsp;is a more accurate comparison). An asterisk (&quot;*&quot;) or two was randomly displayed at the bottom of the display, and then the display scrolled one line up. Another random pair of asterisk was then added to the empty line at the bottom of the screen, and it was scrolled up one line again. This repeated such that it appeared as though a random field of asteroids (asterisks) scrolled up the screen. As the player, you controlled a small ship (a less-than symbol, &quot;&lt;&quot;) half-way up the screen on the right hand side. Using the keyboard you tried to navigate your small ship across the screen without colliding with an aster-oid/isk.</p>
<p>
	It was a clever game and we spent many evenings tweaking the game -- making it richer, more complex, and frankly more fun. I was hooked really at that point. The asteroid density increased over time, limited shields were added to protect your ship a few times, an enemy ship would appear after a while to pursue you -- hastening you across the asteroid field.... Lots of fun.</p>
<p>
	<strong><img alt="commvic20" height="146" src="https://macscene.s3.amazonaws.com/legacy-images/stories/glider_story/commvic20.jpg" style="margin-top: 5px; margin-right: 5px; margin-bottom: 5px; margin-left: 5px; float: left; " width="223" /></strong>Later, one summer when staying up in Alaska with my dad, I started playing with his Commodore VIC-20.&nbsp;<a href="http://www.imdb.com/title/tt0084827/">Tron</a>&nbsp;had been popular, and I had written something similar to the light-cycle game from Tron on my friend's PET. Besides adding color to the game for the VIC-20, I was able to go further still and tweak the character bitmap tables so that instead of your light-cycle in the game being an asterisk or whatever, I could make it look like something more closely resembling the light-cycles from the movie. (This was done by essentially redefining what the text characters looked like when displayed on screen.)</p>
<p>
	Again too, I had hours and hours of fun adding richness to the basic light-cycle game: adding a teleportation option that you could use once to randomly place you somewhere else on the screen, having enemies with different &quot;A.I.'s&quot; (so to speak) &mdash; the harder ones you would encounter as the game progressed. It was enjoyable beyond its technical trappings &mdash; it was fun trying to make the game fun. It was fun creatively.</p>
<p>
	Glider saw its origins as a sort of experiment around that time. By redefining that bitmap tables for the characters, I had basically a blower vent (made up perhaps of two different characters placed side by side to appear as a single wide graphic) and a triangular dart-like paper airplane. The physics of the plane rising when over the vent and then falling when not over the vent was strangely fun to play with. It wasn't a game to speak of at that time, but it was still amusing for some reason &mdash; to just rise and fall and pace across the screen in this fashion. Mentally I filed it away.<br />
	<strong>&nbsp;</strong></p>
<p>
	<strong>RM:&nbsp;</strong><strong>Any idea what made you think to try that experiment?</strong></p>
<p>
	<strong>JC:</strong>&nbsp;Probably two things inspired that idea.</p>
<p>
	<strong><img alt="s_Choplifter_6" height="179" src="https://macscene.s3.amazonaws.com/legacy-images/stories/glider_story/s_Choplifter_6.png" style="margin-top: 5px; margin-right: 5px; margin-bottom: 5px; margin-left: 5px; float: right; " width="257" /></strong>The simple answer is that I had played&nbsp;<a href="http://en.wikipedia.org/wiki/Choplifter">Choplifter</a>&nbsp;on the Atari 2600 and was really impressed with it. I liked the way it was a side-scroller, not unlike one of my arcade favorites: Defender. So in my Commodore exercise, it became a paper airplane you could move left and right, side-scroller style. I suppose the twist I added was the lack of direct vertical control &mdash; you needed to find things for lift (the vents) to get altitude, gravity took care of your coming back down....</p>
<p>
	The other inspiration was probably my playing with paper airplanes as a kid. There was a mall my friends and I would ride our bikes to that had a large air conditioning unit outside. The air conditioner had a large powerful fan that was mounted on top of the unit and blew straight up. Standing on a ledge over the unit one day, I began launching things over it and watching them get lift from the column of air blowing out. At first I found small cup-shaped foam packing peanuts to drop on the column of air. Then I started folding paper helicopters and airplanes and tossing them out over the unit to watch them float and rise on the column of air.</p>
<p>
	At other times, I would find places with an updraft (balconies on tall buildings for example) and could amuse myself for hours with bubbles, paper helicopters or paper airplanes. So this sort of thing was in my DNA. :-)</p>
<p>
	<strong>RM:&nbsp;</strong><strong>When did you return to the air vent and paper plane concept? What made you think it would work as the core mechanic for a game?</strong></p>
<p>
	<strong>JC:</strong>&nbsp;When I got my first Macintosh in college, it was clear I was going to have to learn to program it. After learning the Pascal programming language and getting my own little &ldquo;Hello World&rdquo; app up and running, I turned, as usual, to trying to write a game for the computer.</p>
<p>
	One of the things I learned early on was how to draw an arbitrary bitmap on the screen and animate it. When I could move an image on screen, following your mouse cursor for example, I began to kick around ideas for a game to try and write for the Mac.</p>
<p>
	This is when the paper airplane and blower vent came to mind again. I already had the skills needed to implement this same little demo on the Mac, and with the nice bitmap graphics I could make a much nicer version than the trifle I had done on the Commodore. So I set about drawing a small paper airplane with MacPaint and a small air vent, like you might see in a house, and brought this artwork into my first attempt at a Macintosh game.</p>
<p>
	Throw in some background art that resembles a room, determine when the glider is over a vent and lift the glider, add some collision detection so that the game ends when the glider lands on the floor &mdash; you can see how very quickly you get to the fundamentals of what Glider turned out to be. And like the Commodore experiment, I found this new one fairly amusing to play around with as well.</p>
<p>
	When I considered what I would do to make a proper game out of it, it occurred to me that perhaps I could add an obstacle that you had to avoid, like a shelf. So with clever placement of shelves and floor vents, you could make a sort of puzzle or a kind of obstacle course that the player had to maneuver their glider through. Once I had a few tables and shelves, it became clear in playing around with it that it was kind of fun.</p>
<p>
	Once I had the bones of the game, and believed it would be fun, the real enjoyable part of developing a game began. Now it becomes fun to just let your imagination go and consider other obstacles that might add challenges to the game. How about stringing the rooms together to create a house the player has to get through? How about ducts that connect to other parts of the house? How about a candle? Electrical outlets that periodically zap....</p>
<p>
	You can see how the game can sort of write itself though once you get the seed of a game germinated.</p>
<p>
	<strong>RM:&nbsp;</strong><strong>So Glider kind of grew organically into a proper game -- as opposed to being planned out on paper first. Would you say there was much of an iterative process, where you continually tweaked the existing mechanics and level design whilst experimenting with the ideas individually? Or was it more like you just dumped a lot of ideas in at once, then set about throwing out anything that didn&rsquo;t work after it was done? I guess what I&rsquo;m essentially asking is how did your development process work -- beyond the explosion of creativity that brings all those ideas and the initial proof of concept?</strong></p>
<p>
	<strong>JC:</strong>&nbsp;There was some iteration with the game physics. How quickly should the glider rise on the air column? How quickly should it fall? How fast should it move forward? These are pretty early and fundamental things I tweaked. Once arrived at, though, I couldn&rsquo;t change these things &mdash; objects arranged in the rooms would require repositioning if suddenly the Glider had a different glide ratio. I tried not to make too much work for myself.</p>
<p>
	I think once I got the physics right, it generally evolved as a new item was added -- one at a time (not all at once). So I add a table, get hit detection working so your glider crashes if it lands on top of the table, and I play with adding tables of various heights in a room and see how that improves the game.</p>
<p>
	Then I add something like a candle, add some code so the glider can catch fire and then experiment with laying candles in various places in a room.</p>
<p>
	The game was evolving and growing one object at a time.</p>
<p>
	At a certain point, though, you&rsquo;re just looking around the rooms of your apartment and seeing if you missed anything. Ceiling fan? That one didn&rsquo;t seem like so good a fit for the game. Rug? Maybe as decoration....</p>
<p>
	I looked for variety too, though. The electrical outlets zapping your glider were a nice addition because they added a timing element to the game. Other items I would add later (like toasters, drips, etc.) would also have a timing element. Switches allowed objects to be turned on and off, and added an almost puzzle element to the game.</p>
<p>
	A few items were &ldquo;invented&rdquo; because I thought the game play needed something to perform a specific task. For example, I wanted to add a few &ldquo;power-ups&rdquo; in the game. I thought a power-up that gave you an extra boost would be a useful item to have. So I added the battery object to the game for that purpose. I know it doesn&rsquo;t make logical sense that a battery would be at all useful to a paper glider, but it was the only thing I could think of.</p>
<p>
	I think you get the idea: it grew very evolutionarily.</p>
<p>
	<strong><img alt="mac-plus-front-535" height="164" src="https://macscene.s3.amazonaws.com/legacy-images/stories/glider_story/mac-plus-front-535.jpg" style="margin-top: 5px; margin-right: 5px; margin-bottom: 5px; margin-left: 5px; float: left; " width="128" />RM:&nbsp;</strong><strong>What was your first Mac? When did the Mac Plus make its first appearance within a Glider game? (Glider 1 and 2 were before my time,&nbsp;<span style="text-decoration: line-through; ">and I&rsquo;ve yet to track down a playable copy of either.</span>&nbsp;Glider 2 is available&nbsp;<a href="http://macintoshgarden.org/games/glider-202">here</a>.) Was it some kind of tribute? I know I&rsquo;m certainly a fan of the Mac Plus, with it having been my first computer.</strong></p>
<p>
	<strong>JC:</strong>&nbsp;My first Mac was the Mac Plus. I still love that machine. Glider 1.0 &amp; 2.0 were shareware and replaced very quickly with Glider 3.0. I don&rsquo;t even recall what was different in the various early versions. I think I didn&rsquo;t have sound in 1.0. Perhaps no cat until version 3.0.... In any event, 3.0 was basically the definitive black and white shareware version.</p>
<p>
	Was the Mac Plus in the shareware version? I don&rsquo;t remember. Truly, though, this was one of those things where I looked around my room, saw my Mac Plus, and thought to put it in the game. At some point I picked up a MacRecorder (I think it was called) and I was able to digitize/sample live sounds. I sampled my MacPlus booting up to use in Glider. People do generally respond when they hear for the first time the Mac Plus booting up in Glider.</p>
<p>
	<strong>RM:&nbsp;</strong><strong>What was the reception like for the first public version of Glider? How was it distributed (e.g. BBS, Usenet, disk)? Did it make you much money?</strong></p>
<p>
	<strong>JC:</strong>&nbsp;The reception was pretty good. Looking back at the original B&amp;W version I&rsquo;m a little surprised, though: the artwork was very uneven &mdash; not polished at all.</p>
<p>
	Since I was at a university at the time, I took advantage of the internet access universities had, and FTP&rsquo;ed the shareware Glider to various popular Mac FTP sites. Perhaps umich.edu? I don&rsquo;t remember anymore what the hot Mac FTP sites were. In any event, once you got it to one or two it seemed to just take on a life of its own and migrate from site to site.</p>
<p>
	<strong><img alt="Glider2" height="134" src="https://macscene.s3.amazonaws.com/legacy-images/stories/glider_story/Glider2.png" style="margin-top: 5px; margin-right: 5px; margin-bottom: 5px; margin-left: 5px; float: right; " width="212" /></strong>At some point, my girlfriend (wife now) could pretty much count on at least one shareware check a week for Glider. Being starving college kids, I confess that very often we spent the shareware money on a Friday pizza and two large Cokes. It was a real treat back then, though, to be able to get a pizza once a week or so. :-) It sort of helped me sell the idea of my staying up at all hours of the night programming to my girlfriend. Hey, free pizza for both of us, right?</p>
<p>
	So I wasn&rsquo;t getting rich by any stretch of the imagination, but the letters were often enthusiastic and gave me the sense that Glider was, to some, a special little game.</p>
<p>
	<strong>RM:&nbsp;</strong><strong>How did it feel to get a game out there for the Macintosh? Did you ever really intend to make a career (albeit temporary, given your present arrangements) out of game development?</strong></p>
<p>
	<strong>JC:</strong>&nbsp;No, I never intended to make a career out of game development. I was in college majoring in Education. I intended to make a career out of teaching high school. :-)</p>
<p>
	<strong><img alt="hackers" height="183" src="https://macscene.s3.amazonaws.com/legacy-images/stories/glider_story/hackers.jpg" style="margin-top: 5px; margin-right: 5px; margin-bottom: 5px; margin-left: 5px; float: left; " width="122" /></strong>I have to mention Steve Levy&rsquo;s book&nbsp;<a href="http://www.stevenlevy.com/index.php/other-books/hackers">Hackers</a>, though, because it was after having read his book that I decided to make a go at getting Glider published commercially (which then lead to my career change).</p>
<p>
	Hackers is a great book that tries to cover the creation of &ldquo;hacker culture.&rdquo; And by hacker I mean of course someone clever in their use of computers, not hacker in the derogatory sense. The third section of his book covers game development for personal computers &mdash; specifically&nbsp;<a href="http://en.wikipedia.org/wiki/Sierra_Entertainment">Sierra On-Line</a>&nbsp;(an early Apple II game company). It was impossible not to read about the late night game programming sessions fueled by caffeine and&nbsp;<a href="http://en.wikipedia.org/wiki/Dungeons_%26_Dragons">Dungeons and Dragons</a>&nbsp;and not be a little bit envious of those kids. I was in high school when the Apple II game development that Levy writes about happened. As I read his book, I felt a little sad that the action seemed to have already come and gone while I was still learning BASIC. And it had happened in California to boot (about as far from Kansas as you can get).</p>
<p>
	Still, I thought, &ldquo;Why don&rsquo;t I at least try to get published?&rdquo;&nbsp;<a href="http://en.wikipedia.org/wiki/Maxis">Maxis</a>&nbsp;was a new company (<a href="http://en.wikipedia.org/wiki/SimCity">SimCity</a>&nbsp;had just come out), so I think I called them (no response). The second company I called was Casady &amp; Green, Inc. &mdash; I had seen their game advertisements in MacWorld (<a href="http://macintoshgarden.org/games/crystal-quest">Crystal Quest</a>,&nbsp;<a href="http://macintoshgarden.org/games/sky-shadow">Sky Shadow</a>). They tried out the shareware version of Glider and basically said, &ldquo;Sure.&rdquo; I would do Glider in color, add more rooms to the house, they would get me a color Macintosh for my development and publish Glider. What a deal.</p>
<p>
	<strong><img alt="glider_nes" height="170" src="https://macscene.s3.amazonaws.com/legacy-images/stories/glider_story/glider_nes.jpg" style="margin-top: 5px; margin-right: 5px; margin-bottom: 5px; margin-left: 5px; float: right; " width="196" />RM:&nbsp;</strong><strong>Are you aware of&nbsp;<a href="http://www.retrousb.com/product_info.php?cPath=23&amp;products_id=58">this</a>&nbsp;NES port of&nbsp;<span style="text-decoration: line-through; ">Glider 3.0</span>&nbsp;Glider 4 (my bad.)? It seems crazy that people can play Glider on a console (albeit with a lot of effort).</strong></p>
<p>
	<strong>JC:</strong>&nbsp;Yeah, the guy asked permission to do the port. I was pretty impressed with the effort he undertook to do it. He gave me a free copy and an actual NES machine to play it on as well. Very cool.</p>
<hr />
<p>
	<em>Check out part 2&nbsp;<a href="component/content/article/500.html">here</a>, wherein we discuss community influences, Glider's legacy, the appeal of the Glider concept, and the commercial Glider games -- Glider 4 and Glider PRO.</em>​</p>

"Mods","color":"#80349E","icon":"fas fa-bolt","isHidden":0}},{"type":"tags","id":"1","attributes":{"name":"General","description":null,"slug":"general","color":"#888","backgroundUrl":null,"backgroundMode":null,"icon":null,"discussionCount":2,"position":0,"defaultSort":null,"isChild":false,"isHidden":false,"lastPostedAt":"2025-06-25T13:26:08+00:00","canStartDiscussion":false,"canAddToDiscussion":false}},{"type":"tags","id":"2","attributes":{"name":"Emulation","description":"","slug":"emulation","color":"","backgroundUrl":null,"backgroundMode":null,"icon":"","discussionCount":2,"position":1,"defaultSort":null,"isChild":false,"isHidden":false,"lastPostedAt":"2026-04-08T16:29:21+00:00","canStartDiscussion":false,"canAddToDiscussion":false}},{"type":"tags","id":"3","attributes":{"name":"Gaming","description":"","slug":"gaming","color":"","backgroundUrl":null,"backgroundMode":null,"icon":"","discussionCount":1,"position":2,"defaultSort":null,"isChild":false,"isHidden":false,"lastPostedAt":"2025-04-17T18:51:08+00:00","canStartDiscussion":false,"canAddToDiscussion":false}},{"type":"tags","id":"4","attributes":{"name":"Computing","description":"","slug":"computing","color":"","backgroundUrl":null,"backgroundMode":null,"icon":"","discussionCount":2,"position":3,"defaultSort":null,"isChild":false,"isHidden":false,"lastPostedAt":"2026-03-03T21:07:35+00:00","canStartDiscussion":false,"canAddToDiscussion":false}},{"type":"tags","id":"5","attributes":{"name":"Off-Topic","description":"","slug":"off-topic","color":"","backgroundUrl":null,"backgroundMode":null,"icon":"","discussionCount":1,"position":4,"defaultSort":null,"isChild":false,"isHidden":false,"lastPostedAt":"2024-12-29T17:10:39+00:00","canStartDiscussion":false,"canAddToDiscussion":false}},{"type":"tags","id":"6","attributes":{"name":"News","description":"","slug":"news","color":"","backgroundUrl":null,"backgroundMode":null,"icon":"","discussionCount":1,"position":5,"defaultSort":null,"isChild":false,"isHidden":false,"lastPostedAt":"2024-08-14T03:45:15+00:00","canStartDiscussion":false,"canAddToDiscussion":false}}],"session":{"userId":0,"csrfToken":"lNHL0RkPGbZy7kUozII4DTfyX0UyQ2N9RZDhNicA"},"locales":{"en":"English"},"locale":"en","apiDocument":{"data":{"type":"discussions","id":"4678","attributes":{"title":"Interview: John Calhoun on the Origins of Glider (Part 1)","slug":"4678-interview-john-calhoun-on-the-origins-of-glider-part-1","commentCount":2,"participantCount":0,"createdAt":"2010-11-27T19:13:06+00:00","lastPostedAt":"2010-11-27T19:13:06+00:00","lastPostNumber":1,"canReply":false,"canRename":false,"canDelete":false,"canHide":false,"isApproved":true,"canTag":false,"subscription":null,"isSticky":false,"canSticky":false,"isLocked":false,"canLock":false},"relationships":{"user":{"data":{"type":"users","id":"531"}},"posts":{"data":[{"type":"posts","id":"4693"}]},"tags":{"data":[{"type":"tags","id":"6"}]}}},"included":[{"type":"users","id":"531","attributes":{"username":"mossy_11","displayName":"mossy_11","avatarUrl":"https:\/\/macscene.net\/assets\/avatars\/qVBZzMGo0LTNlbQD.png","slug":"mossy_11","joinTime":"2008-01-30T00:02:22+00:00","discussionCount":0,"commentCount":434,"canEdit":false,"canEditCredentials":false,"canEditGroups":false,"canDelete":false,"lastSeenAt":"2024-12-22T12:07:20+00:00","fof-upload-uploadCountCurrent":null,"fof-upload-uploadCountAll":null,"canSuspend":false},"relationships":{"groups":{"data":[]}}},{"type":"posts","id":"4693","attributes":{"number":1,"createdAt":"2010-11-27T19:13:06+00:00","contentType":"comment","contentHtml":"\u003Cp style=\u0022text-align: center;\u0022\u003E\r\n\t\u003Cimg alt=\u0022glider3-helicopter-small\u0022 height=\u0022242\u0022 src=\u0022https:\/\/macscene.s3.amazonaws.com\/legacy-images\/stories\/glider_story\/glider3-helicopter-small.jpg\u0022 width=\u0022385\u0022 \/\u003E\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\tJohn Calhoun\u0027s \u003Cstrong\u003EGlider\u003C\/strong\u003E games hold a special place in the history of Mac gaming, acting almost as an icon of the platform through much of the 1990s. They spawned a hugely dedicated fan base, which produced a ridiculous amount of original content both for and about Glider -- especially Glider 4 and Glider PRO, the later versions.\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\tI caught up with Calhoun over email recently, and quizzed him on the origins and development of the series. This is the first part of that interview. Read on to discover where the idea for Glider originated, how the game came to exist, and how it dramatically altered Calhoun\u0027s future.\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\tAnd also be sure to check out \u003Ca href=\u0022component\/content\/article\/459.html\u0022\u003EDreaming of a Thousand-Room House: The History and Making of Glider\u003C\/a\u003E, which provides context and a narrative for this interview.\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\t\u003Cstrong\u003ERichard Moss: What inspired you to start programming?\u003C\/strong\u003E\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\t\u0026nbsp;\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\t\u003Cstrong\u003E\u003Cimg alt=\u00222001-a_space_odyssey\u0022 height=\u0022250\u0022 src=\u0022https:\/\/macscene.s3.amazonaws.com\/legacy-images\/stories\/glider_story\/2001-a_space_odyssey.jpg\u0022 style=\u0022margin-top: 5px; margin-right: 5px; margin-bottom: 5px; margin-left: 5px; float: right; \u0022 width=\u0022171\u0022 \/\u003EJohn Calhoun:\u003C\/strong\u003E\u0026nbsp;I can\u0027t say for sure. Growing up, computers were a part of science fiction culture. I associated computers with things futuristic, technical \u0026mdash; and these things interested me when I was young. Movies I enjoyed, like\u0026nbsp;\u003Ca href=\u0022http:\/\/www.imdb.com\/title\/tt0062622\/\u0022\u003E2001: A Space Odyssey\u003C\/a\u003E, and T.V. shows I was drawn to, like the original\u0026nbsp;\u003Ca href=\u0022http:\/\/www.imdb.com\/title\/tt0060028\/\u0022\u003EStar Trek\u003C\/a\u003E, portrayed computers in this way.\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\tProgramming was interesting for a number of reasons, though. There was a certain exploration aspect to it. You knew that there was a lot of potential locked up in the hardware (the computer), and this often helped to draw me further into learning new tricks in software in order to better exploit the machine. Games for the devices showed you that the machine could produce sound, display animated graphics, etc. So when I was just starting to learn to program it was perhaps the technology demonstrated by the computer games that seemed so elusive and out of reach.\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\tBack then, though, I was learning to program in BASIC, so there was no way I was going to be able to write a game that could blit as fast as the commercial hand-coded-assembly games. Still, simple BASIC programs that would render geometric shapes using move-to and line-to calls were in subtle ways teaching me about how a computer displays graphics and such.\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\tI did very quickly come to want to write computer games, though. Since I enjoyed drawing and other art-related things at that time, it may be that I saw games as bridging the artistic and creative pursuits with those more technical. I also felt like I had some ideas for games that I would like to see written.\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\tAnd finally, I enjoyed playing games in the arcades at the time (games like\u0026nbsp;\u003Ca href=\u0022http:\/\/en.wikipedia.org\/wiki\/Defender_%28video_game%29\u0022\u003EDefender\u003C\/a\u003E,\u0026nbsp;\u003Ca href=\u0022http:\/\/en.wikipedia.org\/wiki\/Joust_%28video_game%29\u0022\u003EJoust\u003C\/a\u003E, etc.), but I didn\u0027t have enough spare change to play them nearly as much as I would have liked. A computer game that you write is ostensibly free.\u003Cbr \/\u003E\r\n\t\u003Cstrong\u003E\u0026nbsp;\u003C\/strong\u003E\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\t\u003Cstrong\u003ERM:\u003C\/strong\u003E\u003Cem\u003E\u0026nbsp;\u003C\/em\u003E\u003Cstrong\u003EI\u0026rsquo;ve read that a very early version of Glider was made on a Commodore VIC-20, but you tried making games before that, and there was a sizable period of time wherein you explored other ideas before you returned to Glider. Could you tell me a little about this time? What came out of these early computing and programming experiences, and how did they impact on your interest in games and digital graphics?\u003C\/strong\u003E\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\t\u003Cstrong\u003EJC:\u003C\/strong\u003E\u0026nbsp;A friend had a Commodore PET, and it had come with an interesting little game -- written in BASIC -- that vaguely looked like the arcade game\u0026nbsp;\u003Ca href=\u0022http:\/\/en.wikipedia.org\/wiki\/Asteroids_%28video_game%29\u0022\u003EAsteroids\u003C\/a\u003E\u0026nbsp;(or perhaps\u0026nbsp;\u003Ca href=\u0022http:\/\/en.wikipedia.org\/wiki\/Frogger\u0022\u003EFrogger\u003C\/a\u003E\u0026nbsp;is a more accurate comparison). An asterisk (\u0026quot;*\u0026quot;) or two was randomly displayed at the bottom of the display, and then the display scrolled one line up. Another random pair of asterisk was then added to the empty line at the bottom of the screen, and it was scrolled up one line again. This repeated such that it appeared as though a random field of asteroids (asterisks) scrolled up the screen. As the player, you controlled a small ship (a less-than symbol, \u0026quot;\u0026lt;\u0026quot;) half-way up the screen on the right hand side. Using the keyboard you tried to navigate your small ship across the screen without colliding with an aster-oid\/isk.\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\tIt was a clever game and we spent many evenings tweaking the game -- making it richer, more complex, and frankly more fun. I was hooked really at that point. The asteroid density increased over time, limited shields were added to protect your ship a few times, an enemy ship would appear after a while to pursue you -- hastening you across the asteroid field.... Lots of fun.\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\t\u003Cstrong\u003E\u003Cimg alt=\u0022commvic20\u0022 height=\u0022146\u0022 src=\u0022https:\/\/macscene.s3.amazonaws.com\/legacy-images\/stories\/glider_story\/commvic20.jpg\u0022 style=\u0022margin-top: 5px; margin-right: 5px; margin-bottom: 5px; margin-left: 5px; float: left; \u0022 width=\u0022223\u0022 \/\u003E\u003C\/strong\u003ELater, one summer when staying up in Alaska with my dad, I started playing with his Commodore VIC-20.\u0026nbsp;\u003Ca href=\u0022http:\/\/www.imdb.com\/title\/tt0084827\/\u0022\u003ETron\u003C\/a\u003E\u0026nbsp;had been popular, and I had written something similar to the light-cycle game from Tron on my friend\u0027s PET. Besides adding color to the game for the VIC-20, I was able to go further still and tweak the character bitmap tables so that instead of your light-cycle in the game being an asterisk or whatever, I could make it look like something more closely resembling the light-cycles from the movie. (This was done by essentially redefining what the text characters looked like when displayed on screen.)\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\tAgain too, I had hours and hours of fun adding richness to the basic light-cycle game: adding a teleportation option that you could use once to randomly place you somewhere else on the screen, having enemies with different \u0026quot;A.I.\u0027s\u0026quot; (so to speak) \u0026mdash; the harder ones you would encounter as the game progressed. It was enjoyable beyond its technical trappings \u0026mdash; it was fun trying to make the game fun. It was fun creatively.\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\tGlider saw its origins as a sort of experiment around that time. By redefining that bitmap tables for the characters, I had basically a blower vent (made up perhaps of two different characters placed side by side to appear as a single wide graphic) and a triangular dart-like paper airplane. The physics of the plane rising when over the vent and then falling when not over the vent was strangely fun to play with. It wasn\u0027t a game to speak of at that time, but it was still amusing for some reason \u0026mdash; to just rise and fall and pace across the screen in this fashion. Mentally I filed it away.\u003Cbr \/\u003E\r\n\t\u003Cstrong\u003E\u0026nbsp;\u003C\/strong\u003E\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\t\u003Cstrong\u003ERM:\u0026nbsp;\u003C\/strong\u003E\u003Cstrong\u003EAny idea what made you think to try that experiment?\u003C\/strong\u003E\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\t\u003Cstrong\u003EJC:\u003C\/strong\u003E\u0026nbsp;Probably two things inspired that idea.\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\t\u003Cstrong\u003E\u003Cimg alt=\u0022s_Choplifter_6\u0022 height=\u0022179\u0022 src=\u0022https:\/\/macscene.s3.amazonaws.com\/legacy-images\/stories\/glider_story\/s_Choplifter_6.png\u0022 style=\u0022margin-top: 5px; margin-right: 5px; margin-bottom: 5px; margin-left: 5px; float: right; \u0022 width=\u0022257\u0022 \/\u003E\u003C\/strong\u003EThe simple answer is that I had played\u0026nbsp;\u003Ca href=\u0022http:\/\/en.wikipedia.org\/wiki\/Choplifter\u0022\u003EChoplifter\u003C\/a\u003E\u0026nbsp;on the Atari 2600 and was really impressed with it. I liked the way it was a side-scroller, not unlike one of my arcade favorites: Defender. So in my Commodore exercise, it became a paper airplane you could move left and right, side-scroller style. I suppose the twist I added was the lack of direct vertical control \u0026mdash; you needed to find things for lift (the vents) to get altitude, gravity took care of your coming back down....\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\tThe other inspiration was probably my playing with paper airplanes as a kid. There was a mall my friends and I would ride our bikes to that had a large air conditioning unit outside. The air conditioner had a large powerful fan that was mounted on top of the unit and blew straight up. Standing on a ledge over the unit one day, I began launching things over it and watching them get lift from the column of air blowing out. At first I found small cup-shaped foam packing peanuts to drop on the column of air. Then I started folding paper helicopters and airplanes and tossing them out over the unit to watch them float and rise on the column of air.\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\tAt other times, I would find places with an updraft (balconies on tall buildings for example) and could amuse myself for hours with bubbles, paper helicopters or paper airplanes. So this sort of thing was in my DNA. :-)\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\t\u003Cstrong\u003ERM:\u0026nbsp;\u003C\/strong\u003E\u003Cstrong\u003EWhen did you return to the air vent and paper plane concept? What made you think it would work as the core mechanic for a game?\u003C\/strong\u003E\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\t\u003Cstrong\u003EJC:\u003C\/strong\u003E\u0026nbsp;When I got my first Macintosh in college, it was clear I was going to have to learn to program it. After learning the Pascal programming language and getting my own little \u0026ldquo;Hello World\u0026rdquo; app up and running, I turned, as usual, to trying to write a game for the computer.\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\tOne of the things I learned early on was how to draw an arbitrary bitmap on the screen and animate it. When I could move an image on screen, following your mouse cursor for example, I began to kick around ideas for a game to try and write for the Mac.\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\tThis is when the paper airplane and blower vent came to mind again. I already had the skills needed to implement this same little demo on the Mac, and with the nice bitmap graphics I could make a much nicer version than the trifle I had done on the Commodore. So I set about drawing a small paper airplane with MacPaint and a small air vent, like you might see in a house, and brought this artwork into my first attempt at a Macintosh game.\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\tThrow in some background art that resembles a room, determine when the glider is over a vent and lift the glider, add some collision detection so that the game ends when the glider lands on the floor \u0026mdash; you can see how very quickly you get to the fundamentals of what Glider turned out to be. And like the Commodore experiment, I found this new one fairly amusing to play around with as well.\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\tWhen I considered what I would do to make a proper game out of it, it occurred to me that perhaps I could add an obstacle that you had to avoid, like a shelf. So with clever placement of shelves and floor vents, you could make a sort of puzzle or a kind of obstacle course that the player had to maneuver their glider through. Once I had a few tables and shelves, it became clear in playing around with it that it was kind of fun.\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\tOnce I had the bones of the game, and believed it would be fun, the real enjoyable part of developing a game began. Now it becomes fun to just let your imagination go and consider other obstacles that might add challenges to the game. How about stringing the rooms together to create a house the player has to get through? How about ducts that connect to other parts of the house? How about a candle? Electrical outlets that periodically zap....\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\tYou can see how the game can sort of write itself though once you get the seed of a game germinated.\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\t\u003Cstrong\u003ERM:\u0026nbsp;\u003C\/strong\u003E\u003Cstrong\u003ESo Glider kind of grew organically into a proper game -- as opposed to being planned out on paper first. Would you say there was much of an iterative process, where you continually tweaked the existing mechanics and level design whilst experimenting with the ideas individually? Or was it more like you just dumped a lot of ideas in at once, then set about throwing out anything that didn\u0026rsquo;t work after it was done? I guess what I\u0026rsquo;m essentially asking is how did your development process work -- beyond the explosion of creativity that brings all those ideas and the initial proof of concept?\u003C\/strong\u003E\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\t\u003Cstrong\u003EJC:\u003C\/strong\u003E\u0026nbsp;There was some iteration with the game physics. How quickly should the glider rise on the air column? How quickly should it fall? How fast should it move forward? These are pretty early and fundamental things I tweaked. Once arrived at, though, I couldn\u0026rsquo;t change these things \u0026mdash; objects arranged in the rooms would require repositioning if suddenly the Glider had a different glide ratio. I tried not to make too much work for myself.\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\tI think once I got the physics right, it generally evolved as a new item was added -- one at a time (not all at once). So I add a table, get hit detection working so your glider crashes if it lands on top of the table, and I play with adding tables of various heights in a room and see how that improves the game.\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\tThen I add something like a candle, add some code so the glider can catch fire and then experiment with laying candles in various places in a room.\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\tThe game was evolving and growing one object at a time.\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\tAt a certain point, though, you\u0026rsquo;re just looking around the rooms of your apartment and seeing if you missed anything. Ceiling fan? That one didn\u0026rsquo;t seem like so good a fit for the game. Rug? Maybe as decoration....\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\tI looked for variety too, though. The electrical outlets zapping your glider were a nice addition because they added a timing element to the game. Other items I would add later (like toasters, drips, etc.) would also have a timing element. Switches allowed objects to be turned on and off, and added an almost puzzle element to the game.\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\tA few items were \u0026ldquo;invented\u0026rdquo; because I thought the game play needed something to perform a specific task. For example, I wanted to add a few \u0026ldquo;power-ups\u0026rdquo; in the game. I thought a power-up that gave you an extra boost would be a useful item to have. So I added the battery object to the game for that purpose. I know it doesn\u0026rsquo;t make logical sense that a battery would be at all useful to a paper glider, but it was the only thing I could think of.\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\tI think you get the idea: it grew very evolutionarily.\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\t\u003Cstrong\u003E\u003Cimg alt=\u0022mac-plus-front-535\u0022 height=\u0022164\u0022 src=\u0022https:\/\/macscene.s3.amazonaws.com\/legacy-images\/stories\/glider_story\/mac-plus-front-535.jpg\u0022 style=\u0022margin-top: 5px; margin-right: 5px; margin-bottom: 5px; margin-left: 5px; float: left; \u0022 width=\u0022128\u0022 \/\u003ERM:\u0026nbsp;\u003C\/strong\u003E\u003Cstrong\u003EWhat was your first Mac? When did the Mac Plus make its first appearance within a Glider game? (Glider 1 and 2 were before my time,\u0026nbsp;\u003Cspan style=\u0022text-decoration: line-through; \u0022\u003Eand I\u0026rsquo;ve yet to track down a playable copy of either.\u003C\/span\u003E\u0026nbsp;Glider 2 is available\u0026nbsp;\u003Ca href=\u0022http:\/\/macintoshgarden.org\/games\/glider-202\u0022\u003Ehere\u003C\/a\u003E.) Was it some kind of tribute? I know I\u0026rsquo;m certainly a fan of the Mac Plus, with it having been my first computer.\u003C\/strong\u003E\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\t\u003Cstrong\u003EJC:\u003C\/strong\u003E\u0026nbsp;My first Mac was the Mac Plus. I still love that machine. Glider 1.0 \u0026amp; 2.0 were shareware and replaced very quickly with Glider 3.0. I don\u0026rsquo;t even recall what was different in the various early versions. I think I didn\u0026rsquo;t have sound in 1.0. Perhaps no cat until version 3.0.... In any event, 3.0 was basically the definitive black and white shareware version.\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\tWas the Mac Plus in the shareware version? I don\u0026rsquo;t remember. Truly, though, this was one of those things where I looked around my room, saw my Mac Plus, and thought to put it in the game. At some point I picked up a MacRecorder (I think it was called) and I was able to digitize\/sample live sounds. I sampled my MacPlus booting up to use in Glider. People do generally respond when they hear for the first time the Mac Plus booting up in Glider.\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\t\u003Cstrong\u003ERM:\u0026nbsp;\u003C\/strong\u003E\u003Cstrong\u003EWhat was the reception like for the first public version of Glider? How was it distributed (e.g. BBS, Usenet, disk)? Did it make you much money?\u003C\/strong\u003E\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\t\u003Cstrong\u003EJC:\u003C\/strong\u003E\u0026nbsp;The reception was pretty good. Looking back at the original B\u0026amp;W version I\u0026rsquo;m a little surprised, though: the artwork was very uneven \u0026mdash; not polished at all.\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\tSince I was at a university at the time, I took advantage of the internet access universities had, and FTP\u0026rsquo;ed the shareware Glider to various popular Mac FTP sites. Perhaps umich.edu? I don\u0026rsquo;t remember anymore what the hot Mac FTP sites were. In any event, once you got it to one or two it seemed to just take on a life of its own and migrate from site to site.\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\t\u003Cstrong\u003E\u003Cimg alt=\u0022Glider2\u0022 height=\u0022134\u0022 src=\u0022https:\/\/macscene.s3.amazonaws.com\/legacy-images\/stories\/glider_story\/Glider2.png\u0022 style=\u0022margin-top: 5px; margin-right: 5px; margin-bottom: 5px; margin-left: 5px; float: right; \u0022 width=\u0022212\u0022 \/\u003E\u003C\/strong\u003EAt some point, my girlfriend (wife now) could pretty much count on at least one shareware check a week for Glider. Being starving college kids, I confess that very often we spent the shareware money on a Friday pizza and two large Cokes. It was a real treat back then, though, to be able to get a pizza once a week or so. :-) It sort of helped me sell the idea of my staying up at all hours of the night programming to my girlfriend. Hey, free pizza for both of us, right?\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\tSo I wasn\u0026rsquo;t getting rich by any stretch of the imagination, but the letters were often enthusiastic and gave me the sense that Glider was, to some, a special little game.\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\t\u003Cstrong\u003ERM:\u0026nbsp;\u003C\/strong\u003E\u003Cstrong\u003EHow did it feel to get a game out there for the Macintosh? Did you ever really intend to make a career (albeit temporary, given your present arrangements) out of game development?\u003C\/strong\u003E\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\t\u003Cstrong\u003EJC:\u003C\/strong\u003E\u0026nbsp;No, I never intended to make a career out of game development. I was in college majoring in Education. I intended to make a career out of teaching high school. :-)\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\t\u003Cstrong\u003E\u003Cimg alt=\u0022hackers\u0022 height=\u0022183\u0022 src=\u0022https:\/\/macscene.s3.amazonaws.com\/legacy-images\/stories\/glider_story\/hackers.jpg\u0022 style=\u0022margin-top: 5px; margin-right: 5px; margin-bottom: 5px; margin-left: 5px; float: left; \u0022 width=\u0022122\u0022 \/\u003E\u003C\/strong\u003EI have to mention Steve Levy\u0026rsquo;s book\u0026nbsp;\u003Ca href=\u0022http:\/\/www.stevenlevy.com\/index.php\/other-books\/hackers\u0022\u003EHackers\u003C\/a\u003E, though, because it was after having read his book that I decided to make a go at getting Glider published commercially (which then lead to my career change).\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\tHackers is a great book that tries to cover the creation of \u0026ldquo;hacker culture.\u0026rdquo; And by hacker I mean of course someone clever in their use of computers, not hacker in the derogatory sense. The third section of his book covers game development for personal computers \u0026mdash; specifically\u0026nbsp;\u003Ca href=\u0022http:\/\/en.wikipedia.org\/wiki\/Sierra_Entertainment\u0022\u003ESierra On-Line\u003C\/a\u003E\u0026nbsp;(an early Apple II game company). It was impossible not to read about the late night game programming sessions fueled by caffeine and\u0026nbsp;\u003Ca href=\u0022http:\/\/en.wikipedia.org\/wiki\/Dungeons_%26_Dragons\u0022\u003EDungeons and Dragons\u003C\/a\u003E\u0026nbsp;and not be a little bit envious of those kids. I was in high school when the Apple II game development that Levy writes about happened. As I read his book, I felt a little sad that the action seemed to have already come and gone while I was still learning BASIC. And it had happened in California to boot (about as far from Kansas as you can get).\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\tStill, I thought, \u0026ldquo;Why don\u0026rsquo;t I at least try to get published?\u0026rdquo;\u0026nbsp;\u003Ca href=\u0022http:\/\/en.wikipedia.org\/wiki\/Maxis\u0022\u003EMaxis\u003C\/a\u003E\u0026nbsp;was a new company (\u003Ca href=\u0022http:\/\/en.wikipedia.org\/wiki\/SimCity\u0022\u003ESimCity\u003C\/a\u003E\u0026nbsp;had just come out), so I think I called them (no response). The second company I called was Casady \u0026amp; Green, Inc. \u0026mdash; I had seen their game advertisements in MacWorld (\u003Ca href=\u0022http:\/\/macintoshgarden.org\/games\/crystal-quest\u0022\u003ECrystal Quest\u003C\/a\u003E,\u0026nbsp;\u003Ca href=\u0022http:\/\/macintoshgarden.org\/games\/sky-shadow\u0022\u003ESky Shadow\u003C\/a\u003E). They tried out the shareware version of Glider and basically said, \u0026ldquo;Sure.\u0026rdquo; I would do Glider in color, add more rooms to the house, they would get me a color Macintosh for my development and publish Glider. What a deal.\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\t\u003Cstrong\u003E\u003Cimg alt=\u0022glider_nes\u0022 height=\u0022170\u0022 src=\u0022https:\/\/macscene.s3.amazonaws.com\/legacy-images\/stories\/glider_story\/glider_nes.jpg\u0022 style=\u0022margin-top: 5px; margin-right: 5px; margin-bottom: 5px; margin-left: 5px; float: right; \u0022 width=\u0022196\u0022 \/\u003ERM:\u0026nbsp;\u003C\/strong\u003E\u003Cstrong\u003EAre you aware of\u0026nbsp;\u003Ca href=\u0022http:\/\/www.retrousb.com\/product_info.php?cPath=23\u0026amp;products_id=58\u0022\u003Ethis\u003C\/a\u003E\u0026nbsp;NES port of\u0026nbsp;\u003Cspan style=\u0022text-decoration: line-through; \u0022\u003EGlider 3.0\u003C\/span\u003E\u0026nbsp;Glider 4 (my bad.)? It seems crazy that people can play Glider on a console (albeit with a lot of effort).\u003C\/strong\u003E\u003C\/p\u003E\r\n\u003Cp\u003E\r\n\t\u003Cstrong\u003EJC:\u003C\/strong\u003E\u0026nbsp;Yeah, the guy asked permission to do the port. I was pretty impressed with the effort he undertook to do it. He gave me a free copy and an actual NES machine to play it on as well. Very cool.\u003C\/p\u003E\r\n\u003Chr \/\u003E\r\n\u003Cp\u003E\r\n\t\u003Cem\u003ECheck out part 2\u0026nbsp;\u003Ca href=\u0022component\/content\/article\/500.html\u0022\u003Ehere\u003C\/a\u003E, wherein we discuss community influences, Glider\u0027s legacy, the appeal of the Glider concept, and the commercial Glider games -- Glider 4 and Glider PRO.\u003C\/em\u003E\u200b\u003C\/p\u003E\r\n","renderFailed":false,"canEdit":false,"canDelete":false,"canHide":false,"mentionedByCount":0,"canFlag":false,"isApproved":true,"canApprove":false,"canLike":false,"likesCount":0},"relationships":{"discussion":{"data":{"type":"discussions","id":"4678"}},"user":{"data":{"type":"users","id":"531"}},"mentionedBy":{"data":[]},"likes":{"data":[]}}},
